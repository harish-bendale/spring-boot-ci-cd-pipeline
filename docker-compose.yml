version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: parcel-db
    environment:
      POSTGRES_DB: CRUDDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CRUD_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  parcel-app:
    build: .
    container_name: parcel-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/CRUDDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: CRUD_PASSWORD
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data: